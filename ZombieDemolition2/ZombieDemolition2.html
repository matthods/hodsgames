<!DOCTYPE html>
<html>
	<head>
		<meta charset='utf-8'>
		<title>Zombie Demolition 2</title>
		<link rel='stylesheet' href='Game.css'>
		<link rel='icon' href='images/guns/explosion.png' type='image/x-icon'/>
	</head>
	<body onload='ready()' oncontextmenu="return false">
		<canvas id='canvas' width='1200' height='620'>Loading...</canvas>
		<button id='startBtn' onclick='start()'>START</button>
		<img id='playerSprite' src='images/running/playerSprite.png'>
		<img id='playerStill' src='images/still/playerStill.png'>
		<img id='playerStillShoot' src='images/still/playerStillShoot.png'>
		<img id='playerJumpingSprite' src='images/jumping/jumpingSprite.png'>
		<img id='pistol' src='images/guns/pistol.png'>
		<img id='minigun' src='images/guns/minigun.png'>
		<img id='shotgun' src='images/guns/shotgun.png'>
		<img id='rocketLauncher' src='images/guns/rocketLauncher.png'>
		<img id='missile' src='images/guns/missile.png'>
		<img id='burstRifle' src='images/guns/burstRifle.png'>
		<img id='smg' src='images/guns/smg.png'>
		<img id='explosion' src='images/guns/explosion.png'>
		<img id='crate' src='images/guns/crate.png'>
		<img id='crateSprite' src='images/guns/crateSprite.png'>
		<img id='ammo' src='images/guns/ammo.png'>
		<img id='heart' src='images/health/heart.png'>
		<img id='normalZombieSprite' src='images/zombies/normalZombie.png'>
		<img id='bigZombieSprite' src='images/zombies/bigZombie.png'>
		<img id='babyZombieSprite' src='images/zombies/babyZombie.png'>
		<script src='Game.js'></script>
	</body>
</html>
